<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% if page.keywords %}<meta name="keywords" content="{{ page.keywords }}">{% endif %}
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta name="twitter:card" content="summary">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{ page.title }}",
    "description": "{{ page.description | default: site.description }}",
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.date | date_to_xmlschema }}",
    "author": { "@type": "Organization", "name": "SmartBuyers" },
    "publisher": { "@type": "Organization", "name": "SmartBuyers" },
    "mainEntityOfPage": "{{ page.url | absolute_url }}"
  }
  </script>

  {% include styles.html %}
</head>
<body>
  {% include nav.html %}
  <main class="page-wrap">
    <article class="article-wrap">
      <header class="article-header">
        <h1>{{ page.title }}</h1>
        <div class="article-meta">
          <span>📖 {{ content | number_of_words | divided_by: 200 | plus: 1 }} min czytania</span>
          <span>📅 {{ page.date | date: "%d.%m.%Y" }}</span>
        </div>
      </header>
      <div class="article-body">
        {{ content }}
      </div>
    </article>
  </main>
  {% include footer.html %}
  <script>
    (function(){
      var bar=document.getElementById('readingProgress');
      if(!bar)return;
      window.addEventListener('scroll',function(){
        var h=document.documentElement;
        var pct=(h.scrollTop/(h.scrollHeight-h.clientHeight))*100;
        bar.style.width=Math.min(pct,100)+'%';
      },{passive:true});
    })();
  </script>
</body>
</html>

<style>
:root {
  --accent: #159957;
  --accent-dark: #0f6e3f;
  --accent-light: #e6f5ee;
  --text: #111;
  --text-dim: #555;
  --text-muted: #888;
  --bg: #f5f5f0;
  --card-bg: #fff;
  --border: #ddd;
  --radius: 6px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,.08);
  --font: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', Consolas, monospace;
  --max-w: 1200px;
  --content-w: 740px;
  --badge-tech: #e84d0e;
  --badge-reddit: #5461c8;
  --badge-blog: #159957;
  --badge-default: #636363;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{
  font-family:var(--font);color:var(--text);background:var(--bg);
  line-height:1.7;min-height:100vh;
}

/* ═══ NAVIGATION ═══ */
.site-nav{
  position:sticky;top:0;z-index:100;
  background:rgba(245,245,240,.95);
  border-bottom:1px solid var(--border);
  padding:0 clamp(1rem,3vw,2rem);
}
.nav-inner{
  max-width:var(--max-w);margin:0 auto;
  display:flex;align-items:center;gap:clamp(.4rem,1.5vw,1.2rem);
  height:52px;
}
.nav-logo{
  font-size:1.1rem;font-weight:800;color:var(--accent);
  text-decoration:none;letter-spacing:-.03em;
  margin-right:auto;text-transform:uppercase;
}
.nav-link{
  font-size:.85rem;color:var(--text-dim);text-decoration:none;
  padding:.3rem .6rem;border-radius:4px;
  transition:color .2s,background .2s;
}
.nav-link:hover{color:var(--accent);background:var(--accent-light)}
.nav-link.active{color:var(--accent);font-weight:600}
.nav-link.external{color:var(--accent)}

/* ═══ LAYOUT ═══ */
.page-wrap{max-width:var(--max-w);margin:0 auto;padding:0 clamp(1rem,3vw,2rem)}

/* ═══ HERO ═══ */
.hero{
  background:linear-gradient(135deg,#0a3d25,#062818);
  color:#fff;padding:clamp(2.5rem,5vw,4rem) clamp(1rem,3vw,2rem);
  margin-bottom:clamp(1.5rem,3vw,2rem);
}
.hero-inner{max-width:var(--max-w);margin:0 auto}
.hero-eyebrow{
  font-size:.75rem;text-transform:uppercase;letter-spacing:.12em;
  color:rgba(255,255,255,.5);margin-bottom:.5rem;
}
.hero h1{
  font-size:clamp(1.6rem,3.5vw,2.5rem);
  line-height:1.15;margin-bottom:.6rem;letter-spacing:-.02em;
  font-weight:800;
}
.hero p{
  font-size:clamp(.9rem,1.3vw,1.05rem);
  color:rgba(255,255,255,.75);max-width:600px;
}
.hero-line{width:50px;height:3px;background:var(--accent);margin-top:1rem;border-radius:2px}

/* featured article in hero */
.hero-featured{
  margin-top:1.5rem;padding-top:1.5rem;
  border-top:1px solid rgba(255,255,255,.15);
}
.hero-featured-label{
  font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;
  color:rgba(255,255,255,.4);margin-bottom:.5rem;
}
.hero-featured a{
  color:#fff;text-decoration:none;font-size:1.1rem;font-weight:600;
  display:block;margin-bottom:.3rem;
}
.hero-featured a:hover{color:var(--accent)}
.hero-featured .meta{
  font-size:.8rem;color:rgba(255,255,255,.5);
}

/* ═══ SECTION TITLES ═══ */
.section-header{
  display:flex;align-items:baseline;justify-content:space-between;
  margin:clamp(1.5rem,2.5vw,2.5rem) 0 1rem;
}
.section-title{
  font-size:clamp(1.1rem,1.8vw,1.4rem);
  font-weight:700;letter-spacing:-.01em;
}
.section-link{
  font-size:.82rem;color:var(--accent);text-decoration:none;
  font-weight:500;
}
.section-link:hover{text-decoration:underline}

/* ═══ ARTICLE CARDS ═══ */
.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:clamp(.8rem,1.5vw,1.2rem);
}
.card{
  background:var(--card-bg);border-radius:var(--radius);
  border:1px solid var(--border);
  padding:1.3rem;
  box-shadow:var(--shadow-sm);
  transition:transform .2s,box-shadow .2s;
  display:flex;flex-direction:column;gap:.5rem;
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow-md);
}
.card-badge{
  display:inline-block;font-size:.68rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.05em;
  padding:.15rem .5rem;border-radius:3px;
  align-self:flex-start;
  background:var(--badge-default);color:#fff;
}
.card-badge.is-tech{background:var(--badge-tech)}
.card-badge.is-reddit{background:var(--badge-reddit)}
.card-badge.is-blog{background:var(--badge-blog)}
.card-badge.is-article{background:var(--accent)}
.card-title{font-size:1rem;font-weight:600;line-height:1.35}
.card-title a{color:var(--text);text-decoration:none}
.card-title a:hover{color:var(--accent)}
.card-meta{font-size:.76rem;color:var(--text-muted);display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.card-source{color:var(--accent);font-size:.76rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.card-link{font-size:.82rem;color:var(--accent);text-decoration:none;font-weight:500;align-self:flex-start}
.card-link:hover{text-decoration:underline}

/* featured card (first in grid) */
.card.featured{
  grid-column:1/-1;
  padding:1.8rem;
  border-left:4px solid var(--accent);
}
.card.featured .card-title{font-size:1.2rem}

/* ═══ BLOG SECTION ═══ */
.blog-card{
  background:var(--card-bg);border-radius:var(--radius);
  border:1px solid var(--border);padding:1.3rem;
  box-shadow:var(--shadow-sm);margin-bottom:.8rem;
}
.blog-card h3{font-size:1rem;margin-bottom:.3rem}
.blog-card h3 a{color:var(--text);text-decoration:none}
.blog-card h3 a:hover{color:var(--accent)}
.blog-card .excerpt{font-size:.85rem;color:var(--text-dim);line-height:1.5;margin-bottom:.3rem}
.blog-card .meta{font-size:.76rem;color:var(--text-muted)}
.blog-empty{padding:2rem;text-align:center;color:var(--text-muted);font-style:italic}

/* ═══ SINGLE ARTICLE ═══ */
.page-wrap.article{max-width:var(--content-w)}
.article-header{margin:clamp(1.5rem,3vw,2.5rem) 0 clamp(1rem,2vw,1.5rem)}
.article-header h1{
  font-size:clamp(1.5rem,3vw,2.2rem);
  line-height:1.25;margin-bottom:.6rem;font-weight:800;
}
.article-meta{
  display:flex;align-items:center;gap:1rem;
  font-size:.85rem;color:var(--text-dim);flex-wrap:wrap;
}
.article-meta span{display:flex;align-items:center;gap:.3rem}

.article-body{
  font-size:clamp(1rem,1.3vw,1.1rem);
  line-height:1.8;
}
.article-body h2{
  font-size:1.3rem;margin:2.5rem 0 .8rem;
  padding-bottom:.4rem;border-bottom:2px solid var(--border);
}
.article-body h3{font-size:1.1rem;margin:1.8rem 0 .5rem}
.article-body p{margin:.85rem 0}
.article-body ul,.article-body ol{margin:.85rem 0;padding-left:1.5rem}
.article-body li{margin:.35rem 0}
.article-body a{color:var(--accent);text-decoration:none}
.article-body a:hover{text-decoration:underline}
.article-body img{max-width:100%;height:auto;border-radius:var(--radius);margin:1.5rem 0}
.article-body blockquote{
  border-left:4px solid var(--accent);background:var(--accent-light);
  padding:.8rem 1.2rem;border-radius:0 var(--radius) var(--radius) 0;
  margin:1.2rem 0;color:var(--text-dim);font-style:italic;
}
.article-body pre,code{
  background:#eee;border-radius:4px;
  font-family:var(--font-mono);font-size:.88em;
}
.article-body code{padding:.15rem .4rem}
.article-body pre{padding:1rem;overflow-x:auto;line-height:1.5}
.article-body pre code{padding:0;background:none}
.article-body table{width:100%;border-collapse:collapse;margin:1.2rem 0;font-size:.92em}
.article-body th,.article-body td{
  padding:.5rem .8rem;border:1px solid var(--border);text-align:left;
}
.article-body th{background:#f2f2f2;font-weight:600}

.article-source{
  margin-top:2rem;padding-top:1rem;
  border-top:1px solid var(--border);
  font-size:.82rem;color:var(--text-dim);
}
.article-source a{color:var(--accent)}

.article-related{
  margin-top:2rem;padding:1.2rem;
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:var(--radius);
}
.article-related h2{font-size:1rem;margin-bottom:.8rem;border:none}
.article-related ul{padding-left:1rem}
.article-related li{margin:.4rem 0;font-size:.9rem}

.article-footer{
  margin-top:2.5rem;padding-top:1.2rem;
  border-top:1px solid var(--border);
  font-size:.82rem;color:var(--text-muted);
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;
}
.article-footer a{color:var(--accent)}

/* ═══ READING PROGRESS ═══ */
.reading-progress{
  position:fixed;top:52px;left:0;height:3px;
  background:var(--accent);z-index:99;
  width:0;transition:width .08s linear;
}

/* ═══ EMPTY STATE ═══ */
.empty-state{text-align:center;padding:2rem 1rem;color:var(--text-muted)}

/* ═══ FOOTER ═══ */
.site-footer{
  margin-top:clamp(2.5rem,4vw,4rem);
  padding:clamp(1.2rem,2.5vw,2rem) clamp(1rem,3vw,2rem);
  background:#1a1a1a;color:rgba(255,255,255,.65);
  font-size:.82rem;
}
.footer-inner{
  max-width:var(--max-w);margin:0 auto;
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:1rem;
}
.footer-links{display:flex;gap:1.2rem}
.footer-links a{color:rgba(255,255,255,.65);text-decoration:none}
.footer-links a:hover{color:var(--accent)}

/* ═══ RESPONSIVE ═══ */
@media (max-width:768px){
  .card-grid{grid-template-columns:1fr}
}
@media (max-width:600px){
  .nav-inner{flex-wrap:wrap;height:auto;padding:.4rem 0;gap:.2rem}
  .nav-logo{width:100%;margin-bottom:.15rem;font-size:1rem}
  .reading-progress{top:0}
}

/* ═══ PRINT ═══ */
@media print{
  .site-nav,.site-footer,.reading-progress{display:none}
  body{font-size:11pt;color:#000;background:#fff}
}
</style>

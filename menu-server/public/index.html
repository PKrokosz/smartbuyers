<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SmartBuyers v3</title>
<link rel="stylesheet" href="style.css?v=4">
</head>
<body>

<div class="preloader" id="preloader">
  <div class="preloader-left"></div>
  <div class="preloader-right"></div>
  <div class="preloader-content">
    <span class="preloader-sub">SmartBuyers</span>
    <span class="preloader-title">AI Content Engine</span>
    <div class="preloader-bar"><div class="preloader-fill"></div></div>
  </div>
</div>

<div class="noise"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>

<header class="header">
  <div class="header-left">
    <span class="header-logo">&#9670;</span>
    <span class="header-title">SmartBuyers</span>
    <span class="header-version">v3</span>
  </div>
  <div class="header-right">
    <span class="header-model" id="headerModel">&mdash;</span>
    <div class="header-info" id="headerInfo"></div>
    <div class="header-status" id="headerNbStatus">
      <span class="status-dot off"></span>
      <span class="status-label">NB: &#321;adowanie&hellip;</span>
    </div>
    <div class="header-status" id="headerStatus">
      <span class="status-dot off"></span>
      <span class="status-label">Ollama: &#321;adowanie&hellip;</span>
    </div>
  </div>
</header>

<div class="grid">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-head">📋 Kolejka zadań</div>
      <div class="job-queue" id="jobQueue">
        <div class="job-empty">Brak aktywnych zadań</div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-head">📊 Stan</div>
      <div class="sidebar-stat" id="sidebarArticles" data-action="articles" title="Kliknij aby przeglądać">— artykułów</div>
      <div class="sidebar-stat" id="sidebarTopicQueue" data-action="topic-queue" title="Kliknij aby przeglądać">— tematów</div>
      <div class="sidebar-stat" id="sidebarModel">— model</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-head">⚡ Szybkie akcje</div>
      <div class="sidebar-action" data-action="warmup">🔥 Warmup modelu</div>
      <div class="sidebar-action" data-action="articles">📄 Przeglądaj artykuły</div>
      <div class="sidebar-action" data-action="home">🏠 Dashboard</div>
    </div>
  </aside>
  <div class="main-content">
  <div class="breadcrumb" id="breadcrumb">
    <span class="breadcrumb-item active">Dashboard</span>
  </div>
  <div class="grid-header">
    <h1 class="grid-title" id="pageTitle">Dashboard</h1>
    <p class="grid-sub" id="pageSub">Panel sterowania treścią</p>
  </div>
  <div class="tiles" id="tiles"></div>
  </div>
</div>

<div class="dialog-overlay" id="dialogOverlay"></div>
<div class="dialog" id="dialog">
  <div class="dialog-title" id="dialogTitle"></div>
  <div class="dialog-body" id="dialogBody"></div>
  <div class="dialog-actions" id="dialogActions"></div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js?v=10"></script>
</body>
</html>
